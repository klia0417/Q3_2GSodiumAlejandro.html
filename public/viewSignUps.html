<!DOCTYPE html>
<html>
<head>
<title>Show List of Students Who Signed-Up</title>
<style>
body { font-family: Arial; padding: 20px; }
h1 { margin-bottom: 0; }
select { padding: 6px; margin: 10px 0; }
table { border-collapse: collapse; width: 100%; margin-top: 15px; }
th { background: #001f8f; color: white; padding: 8px; }
td { border: 1px solid #333; padding: 8px; text-align: center; }
button { padding: 4px 8px; cursor: pointer; border-radius: 4px; border: none; background: crimson; color: white; }
.message { margin-top: 10px; font-weight: bold; }
</style>
</head>
<body>

<h1>Show List of Students Who Signed-Up</h1>
<h3>by AL Mendoza</h3>

<a href="index.html">Back to Signup</a>

<br><br>
<label>Select Your Club</label>
<select id="clubFilter" onchange="displaySignUps()">
<option value="ALL">-- select an option --</option>
<option value="Bake Club">Bake Club</option>
<option value="Himig Agham">Himig Agham</option>
<option value="Tech Society">Tech Society</option>
<option value="Arts Guild">Arts Guild</option>
<option value="Sports Club">Sports Club</option>
</select>

<p id="total"></p>
<div id="output"></div>
<div id="message" class="message"></div>

<script>
// DISPLAY TABLE
function displaySignUps() {
    const filter = clubFilter.value;
    const data = localStorage.getItem("clubSignUps");
    const output = document.getElementById("output");
    const total = document.getElementById("total");
    const message = document.getElementById("message");

    output.innerHTML = "";
    total.textContent = "";
    message.textContent = "";

    if (!data) {
        message.textContent = "No sign-ups saved yet.";
        return;
    }

    let list = JSON.parse(data);

    // Filter by club if needed
    if (filter !== "ALL") {
        list = list.filter(item => item.club === filter);
    }

    if (list.length === 0) {
        message.textContent = "No Sign Ups for the club";
        return;
    }

    let table = `<table>
    <tr>
        <th>Club</th><th>ID</th><th>Fullname</th>
        <th>Grade</th><th>Email</th><th>Mobile</th>
        <th>Intern|Extern</th><th>Action</th>
    </tr>`;

    list.forEach((s, index) => {
        table += `<tr>
            <td>${s.club}</td>
            <td>${s.id}</td>
            <td>${s.fullname}</td>
            <td>${s.grade}</td>
            <td>${s.email}</td>
            <td>${s.mobile}</td>
            <td>${s.type}</td>
            <td><button onclick="deleteSignup(${getOriginalIndex(s)})">Delete</button></td>
        </tr>`;
    });

    table += "</table>";
    output.innerHTML = table;
    total.textContent = "Total Signup : " + list.length;
}

// FIND REAL INDEX IN STORAGE (important when filtered)
function getOriginalIndex(signup) {
    let fullList = JSON.parse(localStorage.getItem("clubSignUps"));
    return fullList.findIndex(item =>
        item.id === signup.id &&
        item.email === signup.email
    );
}

// DELETE FUNCTION
function deleteSignup(index) {
    if (!confirm("Are you sure you want to delete this sign-up?")) return;

    let list = JSON.parse(localStorage.getItem("clubSignUps"));
    list.splice(index, 1); // remove 1 item
    localStorage.setItem("clubSignUps", JSON.stringify(list));

    displaySignUps(); // refresh table
}

window.onload = displaySignUps;
</script>

</body>
</html>
